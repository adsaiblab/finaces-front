<div class="dashboard-container">

    <div class="dashboard-header">
        <div class="title-wrapper">
            <h1>FinaCES — Tableau de Bord</h1>
            <p>Aperçu global de l'activité d'évaluation et de la convergence IA.</p>
        </div>

        <button mat-raised-button color="primary" routerLink="/cases/new"
            style="border-radius: 0.5rem; padding: 0.5rem 1.5rem;">
            <mat-icon>add</mat-icon>
            Nouveau dossier
        </button>
    </div>

    <app-kpi-row [stats]="stats$ | async" />

    <div class="dashboard-grid">
        <div class="col-span-2">
            <app-recent-cases-table [cases]="(recentCases$ | async) || []" />
        </div>
        <div>
            <app-active-tensions-card [tensions]="(tensions$ | async) || []" />
        </div>
    </div>

    <div class="chart-section">
        <app-convergence-chart [chartData]="chartData$ | async" />
    </div>

</div>
