<div class="dashboard-container">

    <div class="dashboard-header">
        <div class="title-wrapper">
            <h1>FinaCES — Dashboard</h1>
            <p>Global overview of evaluation activity and AI convergence.</p>
        </div>

        <button mat-raised-button color="primary" routerLink="/cases/new"
            class="btn-new-case">
            <mat-icon>add</mat-icon>
            New Case
        </button>
    </div>

    <app-kpi-row [stats]="stats$ | async" />

    <div class="dashboard-grid">
        <div class="col-span-2">
            <app-recent-cases-table [cases]="(recentCases$ | async) || []" />
        </div>
        <div>
            <app-active-tensions-card [tensions]="(tensions$ | async) || []" />
        </div>
    </div>

    <div class="chart-section">
        <app-convergence-chart [chartData]="chartData$ | async" />
    </div>

</div>
