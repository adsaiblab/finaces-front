<div class="container mx-auto p-4 md:p-6 lg:p-8 max-w-[1600px]">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-[var(--color-content-primary)] m-0">FinaCES — Tableau de Bord</h1>
            <p class="text-[var(--color-content-secondary)] mt-1">Aperçu global de l'activité d'évaluation et de la
                convergence IA.</p>
        </div>

        <button mat-raised-button color="primary" routerLink="/cases/new" class="!rounded-lg !px-6 !py-2">
            <mat-icon>add</mat-icon>
            Nouveau dossier
        </button>
    </div>

    <app-kpi-row [stats]="stats$ | async" />

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
        <div class="lg:col-span-2">
            <app-recent-cases-table [cases]="(recentCases$ | async) || []" />
        </div>
        <div class="lg:col-span-1">
            <app-active-tensions-card [tensions]="(tensions$ | async) || []" />
        </div>
    </div>

    <div class="w-full mb-8">
        <app-convergence-chart [chartData]="chartData$ | async" />
    </div>

</div>
