<div class="members-container">
    <h3 class="section-title">Membres du Groupement</h3>
    <p class="section-desc">Lister les entreprises constituant le groupement principal.</p>

    @for (member of memberGroups; track i; let i = $index) {
    <div class="member-row" [formGroup]="member">
        <mat-form-field appearance="outline" class="field-name">
            <mat-label>Nom de l'entreprise</mat-label>
            <input matInput formControlName="name" placeholder="Ex: Construction SA">
        </mat-form-field>

        <mat-form-field appearance="outline" class="field-role">
            <mat-label>Rôle</mat-label>
            <mat-select formControlName="role">
                <mat-option value="LEADER">Leader</mat-option>
                <mat-option value="MEMBER">Membre</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="field-percent">
            <mat-label>Part (%)</mat-label>
            <input matInput type="number" formControlName="participation_percentage" min="0" max="100">
        </mat-form-field>

        <button mat-icon-button color="warn" (click)="removeMember(i)" matTooltip="Retirer ce membre">
            <mat-icon>delete</mat-icon>
        </button>
    </div>
    }

    <div class="add-btn-wrapper">
        <button mat-stroked-button color="primary" (click)="addMember()">
            <mat-icon>add</mat-icon>
            Ajouter un membre
        </button>
    </div>
</div>
