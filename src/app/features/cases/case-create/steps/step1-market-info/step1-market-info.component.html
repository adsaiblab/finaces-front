<form [formGroup]="formGroup()" class="step-form-grid mt-4">
    <mat-form-field appearance="outline">
        <mat-label>Type de dossier</mat-label>
        <mat-select formControlName="case_type">
            <mat-option value="SINGLE">Single</mat-option>
            <mat-option value="GROUPEMENT">Groupement Solidaire</mat-option>
            <mat-option value="LOTS">Lots distincts</mat-option>
        </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
        <mat-label>Référence du Marché</mat-label>
        <input matInput formControlName="market_reference">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Intitulé complet du Marché</mat-label>
        <input matInput formControlName="market_label">
    </mat-form-field>
    <div class="amount-currency-group">
        <mat-form-field appearance="outline" style="flex: 1;"><mat-label>Montant</mat-label><input matInput
                type="number" formControlName="contract_value"></mat-form-field>
        <mat-form-field appearance="outline" style="width: 120px;"><mat-label>Devise</mat-label>
            <mat-select formControlName="contract_currency"><mat-option value="EUR">EUR</mat-option><mat-option
                    value="USD">USD</mat-option></mat-select>
        </mat-form-field>
    </div>
    <mat-form-field appearance="outline"><mat-label>Durée (mois)</mat-label><input matInput type="number"
            formControlName="contract_duration_months"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Pays cible</mat-label><input matInput
            formControlName="country"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Secteur</mat-label><input matInput
            formControlName="sector"></mat-form-field>
    <div class="full-width sensitive-toggle-box">
        <mat-checkbox formControlName="sensitive" color="warn">
            <span style="color: var(--color-content-primary); font-weight: 500;">Dossier sensible</span>
        </mat-checkbox>
    </div>
    <mat-form-field appearance="outline" class="full-width"><mat-label>Notes</mat-label><textarea matInput
            formControlName="notes" rows="3"></textarea></mat-form-field>
</form>
