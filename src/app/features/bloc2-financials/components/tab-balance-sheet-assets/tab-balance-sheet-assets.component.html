<form [formGroup]="assetsForm" class="flex flex-col gap-8 animate-fade-in">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div formGroupName="currentAssets" class="financial-block">
            <div class="flex items-center gap-2 mb-4">
                <mat-icon class="text-[color:var(--color-primary)]">monetization_on</mat-icon>
                <h3 class="text-lg font-semibold text-[color:var(--color-content-primary)]">Actifs Courants</h3>
            </div>

            <div class="flex flex-col gap-4">
                <mat-form-field class="w-full">
                    <mat-label>Trésorerie et équivalents</mat-label>
                    <input matInput type="number" formControlName="cash" placeholder="0.00">
                    <span matTextPrefix class="mr-2 text-[color:var(--color-content-secondary)]">€</span>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Créances clients</mat-label>
                    <input matInput type="number" formControlName="accountsReceivable" placeholder="0.00">
                    <span matTextPrefix class="mr-2 text-[color:var(--color-content-secondary)]">€</span>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Stocks</mat-label>
                    <input matInput type="number" formControlName="inventory" placeholder="0.00">
                    <span matTextPrefix class="mr-2 text-[color:var(--color-content-secondary)]">€</span>
                </mat-form-field>
            </div>
        </div>

        <div formGroupName="nonCurrentAssets" class="financial-block">
            <div class="flex items-center gap-2 mb-4">
                <mat-icon class="text-[color:var(--color-primary)]">domain</mat-icon>
                <h3 class="text-lg font-semibold text-[color:var(--color-content-primary)]">Actifs Immobilisés</h3>
            </div>

            <div class="flex flex-col gap-4">
                <mat-form-field class="w-full">
                    <mat-label>Immobilisations Corporelles (EPI)</mat-label>
                    <input matInput type="number" formControlName="propertyPlantEquipment" placeholder="0.00">
                    <span matTextPrefix class="mr-2 text-[color:var(--color-content-secondary)]">€</span>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Immobilisations Incorporelles</mat-label>
                    <input matInput type="number" formControlName="intangibleAssets" placeholder="0.00">
                    <span matTextPrefix class="mr-2 text-[color:var(--color-content-secondary)]">€</span>
                </mat-form-field>
            </div>
        </div>
    </div>

    <div
        class="total-bar flex justify-between items-center p-4 rounded-xl border border-[color:var(--color-border-strong)] bg-[color:var(--color-surface-default)]">
        <span class="text-sm font-medium text-[color:var(--color-content-secondary)] uppercase tracking-wider">Total
            Actif ({{ year() }})</span>
        <span class="text-2xl font-bold text-[color:var(--color-content-primary)]">{{ totalAssets() | number:'1.2-2' }}
            €</span>
    </div>

</form>
