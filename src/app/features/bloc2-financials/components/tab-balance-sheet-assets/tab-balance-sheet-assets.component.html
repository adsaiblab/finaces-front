<form [formGroup]="assetsForm" class="flex flex-col gap-8 animate-fade-in">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="financial-block" formGroupName="currentAssets">
            <h3>Current Assets</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <mat-form-field appearance="outline" class="finaces-input">
                    <mat-label>Cash & equivalents</mat-label>
                    <input matInput type="number" formControlName="cash" placeholder="0.00">
                    <span matTextPrefix>MAD</span>
                </mat-form-field>

                <mat-form-field appearance="outline" class="finaces-input">
                    <mat-label>Accounts receivable</mat-label>
                    <input matInput type="number" formControlName="accountsReceivable" placeholder="0.00">
                    <span matTextPrefix>MAD</span>
                </mat-form-field>

                <mat-form-field appearance="outline" class="finaces-input">
                    <mat-label>Inventory</mat-label>
                    <input matInput type="number" formControlName="inventory" placeholder="0.00">
                    <span matTextPrefix>MAD</span>
                </mat-form-field>
            </div>
        </div>

        <div class="financial-block" formGroupName="nonCurrentAssets">
            <h3>Non-Current Assets</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <mat-form-field appearance="outline" class="finaces-input">
                    <mat-label>Property, Plant & Equipment (PP&E)</mat-label>
                    <input matInput type="number" formControlName="propertyPlantEquipment" placeholder="0.00">
                    <span matTextPrefix>MAD</span>
                </mat-form-field>

                <mat-form-field appearance="outline" class="finaces-input">
                    <mat-label>Intangible Assets</mat-label>
                    <input matInput type="number" formControlName="intangibleAssets" placeholder="0.00">
                    <span matTextPrefix>MAD</span>
                </mat-form-field>
            </div>
        </div>
    </div>

    <div class="total-bar">
        <span class="total-label">Total Assets ({{ year() }})</span>
        <span class="total-value">{{ totalAssets() | number:'1.2-2' }} MAD</span>
    </div>

</form>
