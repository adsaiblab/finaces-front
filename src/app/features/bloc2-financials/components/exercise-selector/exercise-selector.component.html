<div
    class="flex items-center gap-2 bg-[color:var(--color-surface-default)] p-1 rounded-lg border border-[color:var(--color-border-default)]">
    @for (year of years(); track year) {
    <button (click)="selectYear(year)" [class.active]="year === selectedYear()"
        class="exercise-pill text-sm font-medium px-4 py-1.5 rounded-md transition-all duration-200 text-[color:var(--color-content-secondary)] hover:text-[color:var(--color-content-primary)]">
        {{ year }}
    </button>
    }
</div>
