<form [formGroup]="cashFlowForm" class="max-w-3xl mx-auto flex flex-col gap-6 animate-fade-in">

    <div class="financial-block p-6">
        <div class="flex items-center gap-2 mb-6 border-b border-[color:var(--color-border-default)] pb-4">
            <mat-icon class="text-[color:var(--color-primary)]">waves</mat-icon>
            <h3 class="text-xl font-semibold text-[color:var(--color-content-primary)]">Statement of Cash Flows</h3>
        </div>

        <div class="flex flex-col gap-4">
            <mat-form-field class="w-full">
                <mat-label>Operating Activities (CFO)</mat-label>
                <input matInput type="number" formControlName="operatingActivities">
                <span matTextPrefix>MAD</span>
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Investing Activities (CFI)</mat-label>
                <input matInput type="number" formControlName="investingActivities">
                <span matTextPrefix>MAD</span>
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Financing Activities (CFF)</mat-label>
                <input matInput type="number" formControlName="financingActivities">
                <span matTextPrefix>MAD</span>
            </mat-form-field>
        </div>
    </div>

    <div class="total-bar flex justify-between items-center p-6 rounded-xl border border-[color:var(--color-border-strong)]"
        [ngClass]="netCashFlow() >= 0 ? 'bg-[color:var(--color-success)] bg-opacity-10' : 'bg-[color:var(--color-error)] bg-opacity-10'">
        <span class="text-sm font-semibold uppercase tracking-wider"
            [ngClass]="netCashFlow() >= 0 ? 'text-[color:var(--color-success)]' : 'text-[color:var(--color-error)]'">
            Net Change in Cash ({{ year() }})
        </span>
        <span class="text-3xl font-bold"
            [ngClass]="netCashFlow() >= 0 ? 'text-[color:var(--color-success)]' : 'text-[color:var(--color-error)]'">
            {{ netCashFlow() | number:'1.2-2' }} MAD
        </span>
    </div>
</form>
