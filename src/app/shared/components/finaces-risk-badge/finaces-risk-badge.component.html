<span [ngClass]="badgeClasses">
    <mat-icon *ngIf="showIcon && metadata.icon" class="badge-icon">
        {{ metadata.icon }}
    </mat-icon>
    <span class="badge-prefix" *ngIf="!isMcc && showLabel">IA</span>
    <span class="badge-label" *ngIf="showLabel">
        {{ metadata.label }}
    </span>
</span>
